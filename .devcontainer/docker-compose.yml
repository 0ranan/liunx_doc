version: '3.8'

services:
  cpp-dev:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - CC=gcc
      - CXX=g++
    volumes:
      - ..:/workspace:cached
      - ~/.ssh:/home/vscode/.ssh:ro
      - ~/.gitconfig:/home/vscode/.gitconfig:ro
    command: sleep infinity
    cap_add:
      - SYS_PTRACE
    security_opt:
      - seccomp:unconfined
    # 可选：如果需要图形界面调试，可以添加以下配置
    # network_mode: host
    # volumes:
    #   - /tmp/.X11-unix:/tmp/.X11-unix
    # environment:
    #   - DISPLAY=${DISPLAY}